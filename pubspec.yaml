name: ehosptal_flutter_revamp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_svg: ^2.0.9
  table_calendar: ^3.0.9
  cupertino_icons: ^1.0.8
  intl:
  record: ^5.1.2
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  flutter_dotenv: ^5.1.0
  file_picker: ^6.1.1
  google_fonts: ^6.1.0
  file_saver: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/ehospital_logo.svg
    - assets/ehospital_logo.png
    - assets/doctors_illustration.png
    - assets/data/
    - assets/data/bills.json
    - assets/.env
